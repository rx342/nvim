name: Update npins

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 3" # runs weekly on wednesday at 02:00 UTC

jobs:
  update-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Lix
        uses: samueldr/lix-gha-installer-action@7b7f14d320d6aacfb65bd1ef761566b3b69e474c # v2026-02-22

      # https://git.lix.systems/lix-project/lix/issues/545#issuecomment-8412
      - name: Fixes and hacks
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Update npins
        run: |
          nix-shell -p npins --run "npins upgrade"
          nix-shell -p npins --run "npins update"
          nix-shell -p npins --run "npins --lock-file ./packages/start.json update"
          nix-shell -p npins --run "npins --lock-file ./packages/opt.json update"

      - uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore(deps): update lockfiles"
